spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/sj2532nb
    username: postgres
    password: 0821
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    time-zone: Asia/Seoul

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

jwt:
  secret: this-is-a-very-long-secret-key-for-jwt-token
  access-token-expiration: 259200000 # 3일 (ms)

cloud:
  aws:
    region:
      static: ap-northeast-2
    s3:
      bucket: sj2532nb-s3-bucket

aws:
  region: ap-northeast-2